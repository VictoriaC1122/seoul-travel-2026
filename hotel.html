<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Seoul Travel Handbook 2026 | Hotel</title>
    <meta name="theme-color" content="#9aaec8" />
    <link rel="icon" type="image/jpeg" href="./assets/images/S__180125889_0.jpg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="hotel">
    <div class="page-progress" id="pageProgress" aria-hidden="true"></div>
    <header class="hero" id="top">
      <div class="hero-shell">
        <div class="top-controls">
          <div class="switcher-card">
            <div class="switcher-label" data-i18n="languageSwitcher">Language</div>
            <div class="pill-group" role="tablist" aria-label="Language switcher">
              <button class="pill-btn active" type="button" data-lang="zh-Hant" aria-label="Switch language to Traditional Chinese">中文</button>
              <button class="pill-btn" type="button" data-lang="en" aria-label="Switch language to English">EN</button>
              <button class="pill-btn" type="button" data-lang="ko" aria-label="Switch language to Korean">KO</button>
            </div>
          </div>
          <div class="switcher-card">
            <div class="switcher-label" data-i18n="currencySwitcher">Currency</div>
            <div class="pill-group" role="tablist" aria-label="Currency switcher">
              <button class="pill-btn active" type="button" data-currency="TWD" aria-label="Switch currency to Taiwan Dollar">TWD</button>
              <button class="pill-btn" type="button" data-currency="KRW" aria-label="Switch currency to Korean Won">KRW</button>
              <button class="pill-btn" type="button" data-currency="CNY" aria-label="Switch currency to Chinese Yuan">CNY</button>
            </div>
          </div>
        </div>
        <div class="hero-card">
          <div class="hero-copy">
            <h1 data-i18n="heroTitle">首爾旅行 2026</h1>
            <p class="hero-subtitle" data-i18n="heroSubtitle">2026 年 5 月 · 首爾</p>
          </div>
          <div class="hero-summary-grid" id="heroSummary" aria-label="Key trip cards"></div>
        </div>
      </div>
    </header>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a class="desktop-nav-link" href="./index.html" data-page-link="overview" data-i18n="navOverview">Overview</a>
      <a class="desktop-nav-link" href="./hotel.html" data-page-link="hotel" data-i18n="navHotel">Hotel</a>
      <a class="desktop-nav-link" href="./hanbok.html" data-page-link="hanbok" data-i18n="navHanbok">Hanbok</a>
      <a class="desktop-nav-link" href="./route.html" data-page-link="route" data-i18n="navRoute">Route</a>
      <a class="desktop-nav-link" href="./budget.html" data-page-link="budget" data-i18n="navBudget">Budget</a>
      <a class="desktop-nav-link" href="./itinerary.html" data-page-link="itinerary" data-i18n="navItinerary">Itinerary</a>
      <a class="desktop-nav-link" href="./checklist.html" data-page-link="checklist" data-i18n="navChecklist">Checklist</a>
      <a class="desktop-nav-link" href="./links.html" data-page-link="links" data-i18n="navLinks">Links</a>
    </nav>
    <section class="key-strip">
      <div class="key-strip-shell">
        <div class="sticky-summary" id="keyInfoBar"></div>
        <div class="jump-links" aria-label="Section jump links">
          <a class="jump-link" href="./index.html" data-page-link="overview" data-i18n="navOverview">Overview</a>
          <a class="jump-link" href="./hotel.html" data-page-link="hotel" data-i18n="navHotel">Hotel</a>
          <a class="jump-link" href="./hanbok.html" data-page-link="hanbok" data-i18n="navHanbok">Hanbok</a>
          <a class="jump-link" href="./route.html" data-page-link="route" data-i18n="navRoute">Route</a>
          <a class="jump-link" href="./budget.html" data-page-link="budget" data-i18n="navBudget">Budget</a>
          <a class="jump-link" href="./itinerary.html" data-page-link="itinerary" data-i18n="navItinerary">Itinerary</a>
          <a class="jump-link" href="./checklist.html" data-page-link="checklist" data-i18n="navChecklist">Checklist</a>
          <a class="jump-link" href="./links.html" data-page-link="links" data-i18n="navLinks">Links</a>
        </div>
      </div>
    </section>
    <main class="container">
      <section class="section-block" id="hotel">
        <div class="section-head">
          <p class="section-kicker" data-i18n="hotelKicker">住宿</p>
          <h2 data-i18n="hotelTitle">住宿</h2>
        </div>
        <div class="stack-grid">
          <article class="simple-card" id="hotelCard"></article>
          <article class="simple-card">
            <h3 data-i18n="hotelGalleryTitle">住宿照片</h3>
            <div class="gallery-grid">
              <figure class="gallery-item">
                <button class="gallery-trigger" type="button" data-image="./assets/images/local-stitch-exterior.jpeg" data-caption-key="hotelExteriorCaption">
                  <img src="./assets/images/local-stitch-exterior.jpeg" alt="Exterior view of Local Stitch Creator Town Seogyo in the Hongdae area" loading="lazy" />
                </button>
                <figcaption data-i18n="hotelExteriorCaption">飯店外觀</figcaption>
              </figure>
              <figure class="gallery-item">
                <button class="gallery-trigger" type="button" data-image="./assets/images/local-stitch-room.jpeg" data-caption-key="hotelRoomCaption">
                  <img src="./assets/images/local-stitch-room.jpeg" alt="Deluxe twin room interior at Local Stitch Creator Town Seogyo" loading="lazy" />
                </button>
                <figcaption data-i18n="hotelRoomCaption">高級雙床房</figcaption>
              </figure>
            </div>
          </article>
        </div>
      </section>
    </main>
    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a class="mobile-nav-link" href="./index.html" data-page-link="overview"><span data-i18n="navOverview">Overview</span></a>
      <a class="mobile-nav-link" href="./hotel.html" data-page-link="hotel"><span data-i18n="navHotel">Hotel</span></a>
      <a class="mobile-nav-link" href="./hanbok.html" data-page-link="hanbok"><span data-i18n="navHanbok">Hanbok</span></a>
      <a class="mobile-nav-link" href="./route.html" data-page-link="route"><span data-i18n="navRoute">Route</span></a>
      <a class="mobile-nav-link" href="./budget.html" data-page-link="budget"><span data-i18n="navBudget">Budget</span></a>
      <a class="mobile-nav-link" href="./itinerary.html" data-page-link="itinerary"><span data-i18n="navItinerary">Itinerary</span></a>
      <a class="mobile-nav-link" href="./checklist.html" data-page-link="checklist"><span data-i18n="navChecklist">Checklist</span></a>
      <a class="mobile-nav-link" href="./links.html" data-page-link="links"><span data-i18n="navLinks">Links</span></a>
    </nav>
    <dialog class="image-modal" id="imageModal" aria-label="Expanded gallery image">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close expanded image">Close</button>
      <img id="modalImage" src="" alt="" />
      <p id="modalCaption"></p>
    </dialog>
    <script src="./script.js"></script>
  </body>
</html>
